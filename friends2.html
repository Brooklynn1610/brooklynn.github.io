<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Friends Directory (Bootstrap Modal)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-4">Friends Directory</h1>
    
    <div id="statusMessage" class="alert alert-info d-none">Loading friends...</div>

    <div class="table-responsive">
      <table class="table table-striped" id="friendsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Phone</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="friendModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="friendModalLabel">Friend details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <pre id="friendJson" style="white-space:pre-wrap;word-wrap:break-word"></pre>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_URL = "https://friends-node-01-47e26a48b0b0.herokuapp.com/friends";
    let friendsData = []; 

    const tableBody = document.querySelector('#friendsTable tbody');
    const statusMessage = document.getElementById('statusMessage');
    const modalEl = document.getElementById('friendModal');
    const friendJsonPre = document.getElementById('friendJson');
    const bsModal = new bootstrap.Modal(modalEl);

    function showMessage(msg, isError = false) {
      statusMessage.textContent = msg;
      statusMessage.className = `alert ${isError ? 'alert-danger' : 'alert-info'} mb-4`;
      statusMessage.classList.remove("d-none");
    }

    function renderTable() {
      tableBody.innerHTML = '';

      friendsData.forEach(friend => {
        const tr = document.createElement('tr');
        const fullName = `${friend.firstName} ${friend.lastName}`;

        tr.innerHTML = `
          <td>${friend.id}</td>
          <td>
            <a href="https://api.com/friends/${friend.id}" class="friend-link" data-id="${friend.id}">
              ${escapeHtml(fullName)}
            </a>
          </td>
          <td>${escapeHtml(friend.phone)}</td>
        `;

        tableBody.appendChild(tr);
      });

     
      document.querySelectorAll('.friend-link').forEach(a => {
        a.addEventListener('click', (ev) => {
          ev.preventDefault();
          const id = a.dataset.id;
          const data = friendsData.find(f => String(f.id) === String(id));
          showFriendInModal(data || { error: 'Friend not found locally' });
        });
      });
    }

    function showFriendInModal(data) {
      friendJsonPre.textContent = JSON.stringify(data, null, 2);
      bsModal.show();
    }


    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function loadFriendsFromAPI() {
      showMessage("Loading friends...");
      
      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }
        
        friendsData = await response.json();
        
        if (!Array.isArray(friendsData) || friendsData.length === 0) {
          showMessage("No friends found.");
          return;
        }

        renderTable();
        statusMessage.classList.add("d-none"); 
        
      } catch (error) {
        showMessage(`Error loading friends: ${error.message}`, true);
      }
    }

    loadFriendsFromAPI();

  </script>
</body>
</html>
